name: robotics-lab-traefik

services:
  traefik:
    image: traefik:v3.7.1@sha256:6b9cbca6fac42ab0075f5437d8dc1685cfd188626d8d515839ea94f8b6271c42
    container_name: robotics-lab-traefik
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      CF_DNS_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?set in .env}
    ports:
      - "192.168.10.29:80:80"
      - "192.168.10.29:443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/acme.json:/acme.json
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy
      traefik.http.routers.lab-health.rule: Host(`health.nexusroboticslab.org`) || Host(`health.nexusrobo.org`)
      traefik.http.routers.lab-health.entrypoints: websecure
      traefik.http.routers.lab-health.tls.certresolver: letsencrypt
      traefik.http.routers.lab-health.tls.domains[0].main: nexusroboticslab.org
      traefik.http.routers.lab-health.tls.domains[0].sans: "*.nexusroboticslab.org"
      traefik.http.routers.lab-health.tls.domains[1].main: nexusrobo.org
      traefik.http.routers.lab-health.tls.domains[1].sans: "*.nexusrobo.org"
      traefik.http.routers.lab-health.service: ping@internal

networks:
  proxy:
    external: true
