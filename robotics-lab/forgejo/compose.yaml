name: robotics-lab-forgejo

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:16.0.0@sha256:9b8f02e896b1151ea60da05cf3e11fc7bd1c432dc6becee75ceb420f3d162b97
    container_name: robotics-lab-forgejo
    restart: unless-stopped
    init: true
    cpus: 1.0
    mem_limit: 1g
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__database__PATH: /data/forgejo/forgejo.db
      FORGEJO__server__DOMAIN: git.nexusroboticslab.org
      FORGEJO__server__ROOT_URL: https://git.nexusroboticslab.org/
      FORGEJO__server__SSH_DOMAIN: git.nexusroboticslab.org
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__server__START_SSH_SERVER: "false"
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__service__SHOW_REGISTRATION_BUTTON: "false"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__security__SECRET_KEY: ${FORGEJO_SECRET_KEY:?set in .env}
      FORGEJO__security__INTERNAL_TOKEN: ${FORGEJO_INTERNAL_TOKEN:?set in .env}
      FORGEJO__log__MODE: console
    ports:
      - "192.168.10.29:2222:22"
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy
      traefik.http.routers.forgejo.rule: Host(`git.nexusroboticslab.org`) || Host(`git.nexusrobo.org`)
      traefik.http.routers.forgejo.entrypoints: websecure
      traefik.http.routers.forgejo.tls.certresolver: letsencrypt
      traefik.http.services.forgejo.loadbalancer.server.port: "3000"

networks:
  proxy:
    external: true
